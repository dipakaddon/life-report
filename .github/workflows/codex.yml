name: Codex Issue Automation

on:
  issues:
    types: [labeled]

jobs:
  codex-run:
    if: contains(github.event.issue.labels.*.name, 'codex')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Codex CLI
        run: npm install -g @openai/codex

      - name: Run Codex
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          codex --full-auto "
          You are a senior developer.

          - Fix bug OR create feature
          - Follow existing project structure (Next.js)
          - Do not break build
          - Ensure code compiles

          Issue Title:
          ${{ github.event.issue.title }}

          Issue Description:
          ${{ github.event.issue.body }}
          "

      - name: Commit & Push Changes
        run: |
          git config user.name "codex-bot"
          git config user.email "bot@example.com"
          git add .
          git commit -m "🤖 Codex update: ${{ github.event.issue.title }}" || echo "No changes"
          git push
