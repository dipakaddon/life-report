<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a0a3e"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#FF8C00" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>
  <!-- Background circle -->
  <circle cx="100" cy="100" r="100" fill="url(#bg)"/>
  <!-- Outer orbit ring -->
  <ellipse cx="100" cy="100" rx="85" ry="85" fill="none" stroke="#4a2080" stroke-width="1" opacity="0.6"/>
  <!-- Inner orbit ring -->
  <ellipse cx="100" cy="100" rx="65" ry="65" fill="none" stroke="#6a30c0" stroke-width="0.8" opacity="0.5"/>
  <!-- Glow effect -->
  <circle cx="100" cy="100" r="45" fill="url(#glow)" filter="url(#blur)"/>
  <!-- Central Om symbol using path -->
  <text x="100" y="118" text-anchor="middle" font-size="62" fill="#FFD700" font-family="serif" opacity="0.95">🕉</text>
  <!-- Orbit dots (planets) -->
  <circle cx="100" cy="15" r="5" fill="#FF8C00"/>
  <circle cx="185" cy="100" r="4" fill="#4488FF"/>
  <circle cx="100" cy="185" r="6" fill="#FF4444"/>
  <circle cx="15" cy="100" r="3.5" fill="#44FF88"/>
  <!-- Stars in background -->
  <circle cx="30" cy="30" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="170" cy="25" r="1" fill="white" opacity="0.7"/>
  <circle cx="175" cy="165" r="1.5" fill="white" opacity="0.9"/>
  <circle cx="25" cy="170" r="1" fill="white" opacity="0.6"/>
  <circle cx="155" cy="50" r="1" fill="white" opacity="0.8"/>
  <circle cx="45" cy="155" r="1" fill="white" opacity="0.7"/>
  <!-- Sparkles -->
  <path d="M100 2 L102 10 L100 18 L98 10 Z" fill="#FFD700" opacity="0.9"/>
  <path d="M182 100 L190 102 L198 100 L190 98 Z" fill="#FFD700" opacity="0.7"/>
</svg>
